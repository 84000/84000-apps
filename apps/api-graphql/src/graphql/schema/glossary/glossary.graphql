"""
Names for a glossary term instance in different languages
"""
type GlossaryTermNames {
  """
  English name/translation
  """
  english: String

  """
  Tibetan name
  """
  tibetan: String

  """
  Sanskrit name
  """
  sanskrit: String

  """
  Pali name
  """
  pali: String

  """
  Chinese name
  """
  chinese: String

  """
  Wylie transliteration
  """
  wylie: String
}

"""
A glossary term instance within a specific work
"""
type GlossaryTermInstance {
  """
  Unique identifier
  """
  uuid: ID!

  """
  Authority UUID for the term
  """
  authority: String!

  """
  Definition of the term
  """
  definition: String

  """
  Names in different languages
  """
  names: GlossaryTermNames!

  """
  Absolute position of this term in the work's glossary (1-based)
  """
  termNumber: Int!

  """
  Paginated passage references where this term appears
  """
  passages(
    """
    Number of passages to return (default: all)
    """
    first: Int

    """
    Cursor from previous page's nextCursor (offset-based)
    """
    after: String
  ): GlossaryPassagesPage!
}

"""
A glossary item for the landing page listing
"""
type GlossaryLandingItem {
  """
  Authority UUID
  """
  uuid: ID!

  """
  Primary headword for the term
  """
  headword: String!

  """
  Type/classification of the term
  """
  type: String!

  """
  Primary language of the headword
  """
  language: String!

  """
  Name variants for the term
  """
  nameVariants: String!

  """
  Definition of the term
  """
  definition: String!

  """
  Number of glossary entries across works
  """
  numGlossaryEntries: Int!
}

"""
A glossary instance appearing in a specific work
"""
type GlossaryInstance {
  """
  UUID of the work containing this instance
  """
  workUuid: ID!

  """
  Tohoku catalog entry
  """
  toh: String!

  """
  Definition for this instance
  """
  definition: String

  """
  Canon the work belongs to
  """
  canon: String

  """
  English names/translations
  """
  english: [String!]!

  """
  Tibetan names
  """
  tibetan: [String!]!

  """
  Sanskrit names
  """
  sanskrit: [String!]!

  """
  Pali names
  """
  pali: [String!]!

  """
  Chinese names
  """
  chinese: [String!]!

  """
  Creators/translators
  """
  creators: [String!]!
}

"""
Related entity for a glossary entry
"""
type GlossaryEntity {
  """
  Source entity headword
  """
  sourceHeadword: String!

  """
  Source entity UUID
  """
  sourceUuid: ID!

  """
  Target entity headword
  """
  targetHeadword: String!

  """
  Target entity UUID
  """
  targetUuid: ID!
}

"""
Detailed glossary entry for the detail page
"""
type GlossaryEntry {
  """
  Authority UUID
  """
  authorityUuid: ID!

  """
  Primary headword
  """
  headword: String!

  """
  Primary language of the headword
  """
  language: String!

  """
  Classifications/types
  """
  classifications: [String!]!

  """
  Definition of the term
  """
  definition: String

  """
  XML ID from source
  """
  xmlId: String

  """
  English names/translations
  """
  english: [String!]!

  """
  Tibetan names
  """
  tibetan: [String!]!

  """
  Sanskrit names
  """
  sanskrit: [String!]!

  """
  Pali names
  """
  pali: [String!]!

  """
  Chinese names
  """
  chinese: [String!]!

  """
  Related instances across works
  """
  relatedInstances: [GlossaryInstance!]!

  """
  Related entities
  """
  relatedEntities: [GlossaryEntity!]!
}

"""
Paginated passage references for a glossary term
"""
type GlossaryPassagesPage {
  """
  Passages in this page
  """
  items: [Passage!]!

  """
  Cursor for fetching the next page (offset encoded as string), null if no more
  """
  nextCursor: String

  """
  Whether more passages exist beyond this page
  """
  hasMore: Boolean!
}

extend type Query {
  """
  Get all glossary terms for the landing page
  """
  glossaryTerms(
    """
    Optional filter by authority UUIDs
    """
    uuids: [ID!]
  ): [GlossaryLandingItem!]!

  """
  Get a single glossary entry by UUID (for detail page)
  """
  glossaryEntry(
    """
    The authority UUID
    """
    uuid: ID!
  ): GlossaryEntry

  """
  Get a single glossary instance by UUID
  """
  glossaryInstance(
    """
    The glossary instance UUID
    """
    uuid: ID!
  ): GlossaryTermInstance

  """
  Get paginated passage references for a glossary term (per-term, on-demand)
  """
  glossaryTermPassages(
    """
    The glossary term instance UUID
    """
    uuid: ID!

    """
    Number of passages to return per page
    """
    first: Int

    """
    Cursor from previous page's nextCursor (offset-based)
    """
    after: String
  ): GlossaryPassagesPage!
}

"""
Paginated connection of glossary term instances for a work
"""
type GlossaryTermConnection {
  """
  List of glossary term instances in this page
  """
  nodes: [GlossaryTermInstance!]!

  """
  Pagination information
  """
  pageInfo: PageInfo!

  """
  Total number of glossary terms in this work
  """
  totalCount: Int!
}

extend type Work {
  """
  Glossary term instances for this work
  """
  glossary(
    """
    Include attestation information
    """
    withAttestations: Boolean
  ): [GlossaryTermInstance!]! @deprecated(reason: "Use glossaryTerms for paginated access")

  """
  Paginated glossary term instances for this work
  """
  glossaryTerms(
    """
    Cursor for pagination (glossary term UUID)
    """
    cursor: String

    """
    Maximum number of terms to return (default: 50, max: 200)
    """
    limit: Int

    """
    Direction for pagination (default: FORWARD)
    """
    direction: PaginationDirection

    """
    Include attestation information
    """
    withAttestations: Boolean
  ): GlossaryTermConnection!
}
