name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - 'libs/**/package.json'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run the publish flow without uploading to npm'
        required: true
        type: boolean
        default: true

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  detect-version-changes:
    name: Detect package version changes
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed package versions
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- \
            libs/lib-utils/package.json \
            libs/data-access/package.json \
            libs/client-graphql/package.json \
            libs/lib-instr/package.json \
            libs/design-system/package.json \
            libs/lib-search/package.json \
            libs/lib-editing/package.json)"

          if [ -z "$changed_files" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r file; do
            [ -n "$file" ] || continue

            current_version="$(git show "${{ github.sha }}:$file" | jq -r '.version // empty')"
            previous_version="$(git show "${{ github.event.before }}:$file" | jq -r '.version // empty')"

            if [ "$current_version" != "$previous_version" ]; then
              echo "Detected version change in $file: $previous_version -> $current_version"
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done <<< "$changed_files"

          echo "has_changes=false" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish npm packages
    needs: detect-version-changes
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.detect-version-changes.outputs.has_changes == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build publishable libraries
        run: npx nx run-many -t build -p lib-utils,data-access,client-graphql,lib-instr,design-system,lib-search,lib-editing

      - name: Publish packages to npm
        if: ${{ !inputs.dry_run }}
        run: npx nx release publish

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        run: npx nx release publish --dry-run
