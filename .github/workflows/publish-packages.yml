name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run the publish flow without uploading to npm'
        required: true
        type: boolean
        default: true

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build publishable libraries
        run: npx nx run-many -t build -p lib-utils,data-access,client-graphql,lib-instr,design-system,lib-search,lib-editing

      - name: Publish packages to npm
        if: ${{ !inputs.dry_run }}
        run: npx nx release publish

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        run: npx nx release publish --dry-run
